# Profile: unittest — used by @DataJpaTest
# Hibernate creates the schema from entity classes directly (no Flyway)
spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # Disable Spring AI auto-configuration in slice tests
  ai:
    google:
      genai:
        api-key: test-key

cors:
  allowed-origins: http://localhost:5173
