# ╔══════════════════════════════════════════════════════════════════╗
# ║  docker-compose.dev.yml — Development Override                   ║
# ║                                                                  ║
# ║  Kịch bản: App chạy trên IDE (IntelliJ), infra trong Docker.    ║
# ║  Ports expose ra localhost để IDE kết nối.                       ║
# ║  Exporters kết nối trực tiếp container qua Docker network.       ║
# ║  Prometheus scrape app qua host.docker.internal (app trên IDE). ║
# ║                                                                  ║
# ║  Chạy:                                                           ║
# ║  docker compose -f docker-compose.yml \                          ║
# ║                 -f docker-compose.dev.yml up -d --remove-orphans ║
# ║  Hoặc: run-dev.bat                                              ║
# ╚══════════════════════════════════════════════════════════════════╝

services:
  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.dev.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=3d'
      - '--web.enable-lifecycle'
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:12.0.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis Exporter ──────────────────────────────────────────────────
  # Kết nối trực tiếp container Redis qua Docker network
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-thanhdeptrai}
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── PostgreSQL Exporter ─────────────────────────────────────────────
  # Kết nối PostgreSQL LOCAL (Windows Service) qua host.docker.internal
  # → Monitor đúng PG instance mà Spring Boot app đang sử dụng
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@host.docker.internal:5432/${POSTGRES_DB:-chatbot}?sslmode=disable"
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis ───────────────────────────────────────────────────────────
  # Expose port để IDE kết nối localhost:6379
  redis:
    ports:
      - "6379:6379"
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-thanhdeptrai}
      --appendonly yes 
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --tcp-backlog 128
      --timeout 300
      --tcp-keepalive 60
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 768M
        reservations:
          cpus: '0.10'
          memory: 256M

  # ── PostgreSQL ──────────────────────────────────────────────────────
  # Expose port để IDE/tools kết nối trực tiếp
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ── Qdrant ──────────────────────────────────────────────────────────
  # Expose ports để IDE kết nối
  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

volumes:
  prometheus_data:
  grafana_data:
