services:
  spring-ai:
    build: .
    container_name: spring-ai
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # ── API Keys ──────────────────────────────
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      COHERE_API_KEY: ${COHERE_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      # ── Database ──────────────────────────────
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}      # spring-ai YAML dùng DB_USERNAME
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # ── Redis ─────────────────────────────────
      REDIS_HOST: redis                  # container name trong docker network
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-thanhdeptrai}
      # ── Qdrant ────────────────────────────────
      QDRANT_HOST: qdrant                # container name trong docker network
      QDRANT_PORT: 6334
      # ── CORS ──────────────────────────────────
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # ── Cookie ────────────────────────────────
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-false}
    restart: unless-stopped
    # Giới hạn tài nguyên cho Spring Boot App
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M
    # Healthcheck trỏ đến Spring Boot Actuator endpoint
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  postgres:
    image: postgres:16-alpine
    container_name: spring-ai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # Giới hạn tài nguyên cho Postgres
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      # Dùng ${POSTGRES_USER} từ env của container thay vì hardcode "postgres"
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8.4.0-alpine
    container_name: spring-ai-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-thanhdeptrai}

    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-thanhdeptrai}
      --appendonly yes 
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60

    volumes:
      - redis_data:/data

    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 640M
        reservations:
          cpus: '0.25'
          memory: 256M

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-thanhdeptrai}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    sysctls:
      - net.core.somaxconn=1024

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__TELEMETRY_DISABLED=true
    restart: unless-stopped
    # Giới hạn tài nguyên cho Qdrant
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 256M
    healthcheck:
      # Qdrant image không có wget/curl – dùng bash tcp redirect thay thế
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  qdrant_storage:
  qdrant_snapshots: