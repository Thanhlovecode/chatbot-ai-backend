# ╔══════════════════════════════════════════════════════════════════╗
# ║  docker-compose.yml — BASE Infrastructure                       ║
# ║                                                                  ║
# ║  Chứa các service nền tảng: PostgreSQL, Redis, Qdrant.          ║
# ║  KHÔNG chứa spring-ai app (→ docker-compose.prod.yml)           ║
# ║  KHÔNG chứa monitoring stack (→ dev.yml / prod.yml)             ║
# ║  KHÔNG expose port ra host (tránh conflict với local services)  ║
# ║                                                                  ║
# ║  Sử dụng:                                                       ║
# ║  • Dev:  docker compose -f docker-compose.yml \                  ║
# ║                         -f docker-compose.dev.yml up -d          ║
# ║  • Prod: docker compose -f docker-compose.yml \                  ║
# ║                         -f docker-compose.prod.yml up -d         ║
# ╚══════════════════════════════════════════════════════════════════╝

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────
  # Ports KHÔNG được expose ở base:
  # • Dev: IDE kết nối qua port mapped trong dev.yml
  # • Prod: spring-ai kết nối qua Docker internal network
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?Error - POSTGRES_DB must be set in .env}"
      POSTGRES_USER: "${POSTGRES_USER:?Error - POSTGRES_USER must be set in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Error - POSTGRES_PASSWORD must be set in .env}"
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Ho_Chi_Minh
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:8.4.0-alpine
    container_name: redis
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-thanhdeptrai}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    sysctls:
      - net.core.somaxconn=1024
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Qdrant ───────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__TELEMETRY_DISABLED=true
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Network — shared across base + override files ──────────────────────
networks:
  backend:
    driver: bridge
    name: chatbot-network

volumes:
  postgres_data:
  redis_data:
  qdrant_storage:
  qdrant_snapshots:
